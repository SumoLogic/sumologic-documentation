          description: The duration of time in minutes that a locked-out account remained
            locked before getting unlocked automatically.
          format: int32
          example: 30
          default: 30
        requireMfa:
          type: boolean
          description: "If MFA should be required to log in. By default, this field\
            \ is set to `false`."
