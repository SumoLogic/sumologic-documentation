    CreateJobResponse:
      type: object
      properties:
        warning:
          type: string
          description: Warnings value contains the detailed information about the
            warning while creating the search job.
        id:
          type: string
          description: The search job identifier.
        link:
          $ref: '#/components/schemas/Link'
    Link:
      type: object
      properties:
        rel:
          type: string
          description: Relation.
        href:
          type: string
          description: URL of the search job.
    CreateJobRequest:
      required:
      - from
      - query
      - timezone
      - to
      type: object
      properties:
        query:
          type: string
          description: |
            The actual search expression. Ensure your query follows [RFC 8259](https://datatracker.ietf.org/doc/html/rfc8259) and is valid JSON format,  you may need to escape certain characters to follow the [RFC 8259](https://datatracker.ietf.org/doc/html/rfc8259).
          example: _sourceCategory=service
        from:
          maxLength: 20
          type: string
          description: |
            The start date and time of the search. This follows the [ISO 8601](https://www.w3.org/TR/NOTE-datetime) date and time format.
          example: 2017-07-26T00:00:00
        to:
          maxLength: 20
          type: string
          description: |
            The end date and time of the search. This follows the [ISO 8601](https://www.w3.org/TR/NOTE-datetime) date and time format.
          example: 2017-07-26T00:00:00
        timezone:
          type: string
          description: "The time zone if from/to is not in milliseconds. See this\
            \ [Wikipedia article](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)\
            \ for a list of time zone codes."
          default: UTC
        autoParsingMode:
          pattern: ^(Manual|AutoParse)$
          type: string
          description: |
            Define the parsing mode to scan the JSON format log messages. Possible values are:

            AutoParse - System automatically figures out the fields to parse based on the search query.

            Manual - No fields are parsed out automatically. For more information, refer to the [Dynamic Parsing](https://help.sumologic.com/docs/manage/field-extractions/create-field-extraction-rule/).
          example: Manual
          default: Manual
          x-pattern-message: should be either 'Manual' or 'AutoParse'
        requiresRawMessages:
          type: string
          description: |
            On enabling this field, the log messages applicable to the search are returned. Maximum value is 100,000. This is only applicable for aggregate queries.
          default: "false"
        maxRawRecords:
          type: string
          description: Maximum number of raw records to finish the search.
        intervalTimeType:
          pattern: ^(messageTime|receiptTime|searchableTime)$
          type: string
          description: "This parameter defines whether you want to run the search\
            \ by messageTime, receiptTime or searchableTime."
          example: messageTime
          default: messageTime
          x-pattern-message: should be either 'messageTime' or 'receiptTime' or 'searchableTime'
