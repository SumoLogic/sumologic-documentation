    ListEventExtractionRulesResponse:
      required:
      - data
      type: object
      properties:
        data:
          type: array
          description: List of event extraction rules.
          items:
            $ref: '#/components/schemas/EventExtractionRuleWithDetails'
    EventExtractionRuleWithDetails:
      type: object
      description: Event extraction rule object.
      allOf:
      - $ref: '#/components/schemas/EventExtractionRule'
      - required:
        - id
        type: object
        properties:
          id:
            type: string
            description: Id of the event extraction rule.
            example: "0000000001213227"
          createdAt:
            type: string
            description: "Creation timestamp in UTC in [RFC3339](https://tools.ietf.org/html/rfc3339)\
              \ format."
            format: date-time
          createdBy:
            type: string
            description: Identifier of the user who created the resource.
          modifiedAt:
            type: string
            description: Last modification timestamp in UTC.
            format: date-time
          modifiedBy:
            type: string
            description: Identifier of the user who last modified the resource.
          enabled:
            type: boolean
            description: Flag indicating whether the event extraction rule is enabled
              or disabled.
            example: true
          disableReason:
            type: string
            description: "Reason for disabling the event extraction rule, if applicable."
            example: Event Extraction Rule output exceeded maximum allowed rate of
              1000 events per hour in last 24 hours.
    EventExtractionRule:
      required:
      - configuration
      - name
      - query
      type: object
      properties:
        name:
          maxLength: 256
          minLength: 1
          type: string
          description: Name of event extraction rule.
          example: foo
        description:
          maxLength: 1024
          type: string
          description: Description of event extraction rule.
          example: foo
        query:
          type: string
          description: |
            Query string for the Event Extraction Rule. Logs matching this query are periodically ingested into the `sumologic_userdata_events` index (**Events**).

            Guidelines for creating the query:
              - Optimize the query to limit the number of returned log messages (intended for special logs only).
              - The query runs in `Manual` mode, explicitly parse and extract only the necessary fields for event correlation and visualization.
              - Use the `fields` operator to restrict the output to required fields.
          example: _sourceCategory=eventSource
        correlationExpression:
          required:
          - eventFieldName
          - queryFieldName
          - stringMatchingAlgorithm
          type: object
          properties:
            queryFieldName:
              type: string
              description: Name of the query field returned by a log search query.
              example: _sourcecategory
            eventFieldName:
              type: string
              description: Name of the field from event query output.
              example: foo
            stringMatchingAlgorithm:
              pattern: ^(ExactMatch)$
              type: string
              description: Type of string matching algorithm which tells how to match
                eventFieldName and queryFieldName.
              example: ExactMatch
          description: "Correlation Expression specifies how to determine related\
            \ events for a log search query. \nThe value of `eventFieldName` from\
            \ Events is compared with the values of `queryFieldName` from the log\
            \ search query output using the defined stringMatchingAlgorithm. Events\
            \ that match according to this algorithm are considered correlated.\n"
        configuration:
          maxProperties: 1000
          required:
          - eventName
          - eventPriority
          - eventSource
          - eventType
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FieldMapping'
          description: |
            Configuration for the Event Extraction Rule.

            This object defines how event fields are mapped to their corresponding values.
            Each field specifies a `valueSource`, which provides the actual value, and an optional `mappingType`,
            indicating the value is hardcoded.

            The following fields are **required**:
              - `eventType`: Type of the event. Accepted values are `Deployment`, `Feature Flag Change`, `Configuration Change` or `Infrastructure Change`.
              - `eventPriority`: Indicates the priority of the event. Accepted values are `High`, `Medium`, or `Low`.
              - `eventSource`: Source system or component where the event originated (e.g., "Jenkins").
              - `eventName`: Descriptive name of the event (e.g., "monitor-manager deployed.").

            The following fields are **optional**:
              - `eventDescription`: Additional context or details about the event.

            Custom fields can also be added as needed to capture domain-specific event data.
          example:
            eventType:
              valueSource: Deploy
              mappingType: HardCoded
            eventPriority:
              valueSource: High
              mappingType: HardCoded
            eventSource:
              valueSource: Jenkins
              mappingType: HardCoded
            eventName:
              valueSource: monitor-manager deployed.
              mappingType: HardCoded
            eventDescription:
              valueSource: 2 containers in monitor-manager were upgraded.
              mappingType: HardCoded
    FieldMapping:
      required:
      - valueSource
      type: object
      properties:
        valueSource:
          maxLength: 256
          type: string
          description: The actual value or field reference for the mapping.
          example: Knobs Changes
        mappingType:
          pattern: ^(HardCoded)$
          type: string
          description: Specifies valueSource is hardcoded.
          example: HardCoded
          x-pattern-message: Must be `HardCoded`
    EventExtractionRulesQuotaUsage:
      required:
      - quota
      - remaining
      type: object
      properties:
        quota:
          type: integer
          description: Maximum number of EventExtractionRules allowed.
          format: int32
          example: 200
        remaining:
          type: integer
          description: Remaining number of EventExtractionRules allowed.
          format: int32
          example: 121
    ScanBudgetList:
      required:
