          format: int64
          example: 30000
        rollup:
          pattern: ^(Avg|Sum|Min|Max|Count|Rate)$|^$
          type: string
          description: "We use the term rollup to refer to the aggregation function\
            \ Sumo Logic uses when quantizing metrics. Can be `Avg`, `Sum`, `Min`,\
            \ `Max`, `Count` or `Rate`."
          example: Avg
