              \ endpoint."
          operator:
            type: string
            description: |-
              The operator to use. Accepted values:
                <table>
                  <tr>
                    <th>Operator</th>
                    <th>Accepted value types</th>
                  </tr>
                  <tr>
                    <th>&lt; &lt;= &gt; &gt;= =</th>
                    <th>DoubleTracingValue IntegerTracingValue</th>
                  </tr>
                  <tr>
                    <th>between</th>
