name: Pull Request Checks

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

env:
  CI: true
  NODE_ENV: production
  NODE_OPTIONS: "--max-old-space-size=8192 --max-http-header-size=8192"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
      - name: Docusaurus Webpack cache
        uses: actions/cache@v5
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-webpack-cache-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Clear the Docusaurus site
        run: |
          yarn clear
      - name: Build the Docusaurus site
        run: yarn build
      # --- Disallowed character checks for Pantheon ---
      # 1) Fail if any file path in the build output contains disallowed characters
      - name: Check build artifact paths for disallowed characters
        env:
          BUILD_DIR: build
        shell: bash
        run: |
          if [ ! -d "$BUILD_DIR" ]; then
            echo "No $BUILD_DIR directory found; skipping path check."
            exit 0
          fi
          # Disallowed chars: " : < > | * ?
          OFFENDERS="$(find "$BUILD_DIR" -type f | grep -E '[":<>|*?]')" || true
          if [ -n "$OFFENDERS" ]; then
            echo "❌ Disallowed characters found in build artifact paths:"
            echo "$OFFENDERS"
            while IFS= read -r p; do
              rel="${p#$(pwd)/}"
              [ "$rel" = "$p" ] && rel="$p"
              badchars=$(echo "$rel" | grep -oE '[":<>|*?]' | tr -d '\n')
              echo "::error file=${rel}::Disallowed character(s) found in build artifact path: [${badchars}] (Pantheon rejects paths containing any of: \" : < > | * ?)"
            done <<< "$OFFENDERS"
            exit 1
          fi
          echo "✅ No disallowed characters found in build artifact paths."
      # 2) Fail if any Markdown/MDX link target contains disallowed characters (excluding external links).
      #    Ignores fenced code blocks (```/~~~) and inline code (`...`) to avoid false positives from code samples.
      - name: Check Markdown/MDX links for disallowed characters
        shell: bash
        run: |
          FILES="$(git ls-files '*.md' '*.mdx' 2>/dev/null || true)"
          if [ -z "$FILES" ]; then
            echo "No Markdown/MDX files found; skipping link check."
            exit 0
          fi
          BAD_LINKS=$(
            awk '
              BEGIN { in_code=0 }
              {
                raw=$0

                # Toggle fenced code blocks starting with ``` or ~~~
                if (match(raw, /^\s*(```|~~~)/)) { in_code = !in_code; next }
                if (in_code) { next }

                # Strip inline code spans so patterns inside don’t trigger
                line = raw
                gsub(/`[^`]*`/, "", line)

                # Find real Markdown links: [text](url)
                while (match(line, /\[[^]]+\]\(([^)]+)\)/, m)) {
                  url=m[1]

                  # Skip external schemes
                  if (url ~ /^(https?:|mailto:|tel:)/) { line=substr(line, RSTART+RLENGTH); continue }

                  # Drop query + fragment
                  sub(/\?.*$/, "", url)
                  sub(/#.*/, "", url)

                  # Disallowed characters in relative link targets: " : < > | * ?
                  if (url ~ /[":<>|*?]/) {
                    printf("%s\t%d\t%s\n", FILENAME, FNR, m[0])
                  }

                  line=substr(line, RSTART+RLENGTH)
                }
              }
            ' $FILES
          )

          if [ -n "$BAD_LINKS" ]; then
            echo "❌ Disallowed characters found in Markdown/MDX link targets:"
            echo "$BAD_LINKS"
            while IFS=$'\t' read -r file line match; do
              [ -z "$file" ] && continue
              badchars=$(echo "$match" | grep -oE '[":<>|*?]' | tr -d '\n')
              echo "::error file=${file},line=${line}::Disallowed character(s) in Markdown link target: [${badchars}] ${match} (Not allowed: \" : < > | * ?)"
            done <<< "$BAD_LINKS"
            exit 1
          fi
          echo "✅ No disallowed characters found in Markdown/MDX link targets."
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check spelling
        uses: codespell-project/actions-codespell@v2
        with:
          path: docs
          skip: "*.svg,*.js,*.map,*.css,*.scss"
          ignore_words_list: "aks,atleast,cros,ddress,delink,fiel,ist,nd,ot,pullrequest,ser,shttp,wast,fo,seldomly,delt,cruzer,plack,secur,te,nginx,Nginx,notin"
  check-merge-window:
    name: Merge window
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check merge window
        uses: actions/github-script@v7
        with:
          script: |
            // Allowed: Mon–Fri, 8:00 am IST (India team start) through 2:00 pm PT, non-holidays.
            // Override: apply the 'active-incident' label for active service incidents only.
            // Update holiday lists annually using the Sumo Logic Holiday Calendar.

            const OVERRIDE_LABEL = 'active-incident';

            // USA + Global Quarterly Wellness Days — checked against the PT calendar date.
            const PT_HOLIDAYS = new Set([
              '2026-03-13', '2026-06-22', '2026-09-04', '2026-12-11', // Global QWDs
              '2026-01-01', '2026-01-19', '2026-05-25', '2026-06-19', // USA
              '2026-07-03', '2026-09-07', '2026-11-26', '2026-11-27',
              '2026-12-24', '2026-12-25', '2026-12-31', '2027-01-01',
            ]);

            // India + Global Quarterly Wellness Days — checked against the IST calendar date.
            const IST_HOLIDAYS = new Set([
              '2026-03-13', '2026-06-22', '2026-09-04', '2026-12-11', // Global QWDs
              '2026-01-01', '2026-01-14', '2026-01-26', '2026-05-01', // India
              '2026-05-27', '2026-09-14', '2026-10-02', '2026-10-20',
              '2026-11-06', '2026-12-25', '2027-01-01',
            ]);

            function getTimeInfo(timeZone) {
              const parts = Object.fromEntries(
                new Intl.DateTimeFormat('en-US', {
                  timeZone,
                  year: 'numeric', month: '2-digit', day: '2-digit',
                  weekday: 'long', hour: '2-digit', hourCycle: 'h23',
                }).formatToParts(new Date()).map(({ type, value }) => [type, value])
              );
              return {
                date:    `${parts.year}-${parts.month}-${parts.day}`,
                weekday: parts.weekday,
                hour:    parseInt(parts.hour, 10),
              };
            }

            const WEEKDAYS = new Set(['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday']);
            const pt  = getTimeInfo('America/Los_Angeles');
            const ist = getTimeInfo('Asia/Kolkata');

            let blockedReason = null;
            if      (!WEEKDAYS.has(pt.weekday))  blockedReason = 'weekend';
            else if (pt.hour >= 14)              blockedReason = 'after 2:00 pm PT';
            else if (!WEEKDAYS.has(ist.weekday)) blockedReason = 'weekend in India';
            else if (ist.hour < 8)               blockedReason = 'before 8:00 am IST — India team has not started yet';
            else if (PT_HOLIDAYS.has(pt.date))   blockedReason = `Sumo holiday (${pt.date} PT)`;
            else if (IST_HOLIDAYS.has(ist.date)) blockedReason = `Sumo holiday (${ist.date} IST)`;

            if (!blockedReason) {
              core.info(`Merge window open — PT: ${pt.weekday} ${pt.hour}:xx, IST: ${ist.weekday} ${ist.hour}:xx`);
              return;
            }

            const labels = context.payload.pull_request?.labels ?? [];
            if (labels.some(l => l.name === OVERRIDE_LABEL)) {
              core.warning(`active-incident override active. Bypassed: ${blockedReason}`);
              return;
            }

            core.setFailed(
              `Merge blocked: ${blockedReason}. ` +
              'Window: Mon–Fri, 8:00 am IST – 2:00 pm PT, non-holidays. ' +
              'Active service incident? Apply the active-incident label and re-run this check.'
            );
