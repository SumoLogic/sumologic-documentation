name: Trigger Jenkins pipeline

on:
  workflow_call:
    secrets:
      WEBOPS_AWS_REGION:
        required: true
      WEBOPS_AWS_SG_NAME:
        required: true
      WEBOPS_JENKINS_PORT:
        required: true
      WEBOPS_JENKINS_HOST:
        required: true
      WEBOPS_AWS_ROLE_JENKINS:
        required: true
      WEBOPS_WEBHOOK_TOKEN:
        required: true

jobs:
  trigger-jenkins-pipeline:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Get runner public IP
        if: always()
        id: ip
        run: |
          set -euo pipefail

          MAX_RETRIES=5
          RETRY=0

          # Get IPv4
          until IPV4=$(curl -sSLf --max-time 5 https://api4.ipify.org) || [ $RETRY -ge $MAX_RETRIES ]; do
          	RETRY=$((RETRY + 1))
          	echo "IPv4 attempt $RETRY of $MAX_RETRIES failed, retrying..."
          	sleep 2
          done

          if [ -z "$IPV4" ]; then
          	echo "Failed to retrieve public IPv4 after $MAX_RETRIES attempts"
          	exit 1
          fi

          echo "v4=$IPV4" >> $GITHUB_OUTPUT
      - name: Get cause
        id: cause
        run: |
          DEFAULT_REASON="${{ github.workflow }} run #${{ github.run_number }}"
          REASON="DOCS@$(echo "${{ github.sha }}" | cut -c 1-7): ${{ github.event.pull_request.title || github.event.head_commit.message || '$DEFAULT_REASON' }}"
          echo "reason=$REASON" >> $GITHUB_OUTPUT
      - name: Authenticate to AWS via OIDC
        env:
          AWS_ROLE_ARN: ${{ secrets.WEBOPS_AWS_ROLE_JENKINS }}
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to retrieve OIDC token"
            exit 1
          fi
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "$AWS_ROLE_ARN" \
            --role-session-name "GitHubActions" \
            --web-identity-token "$OIDC_TOKEN" \
            --duration-seconds 3600 \
            --query 'Credentials' \
            --output json)
          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.AccessKeyId')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.SecretAccessKey')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.SessionToken')" >> $GITHUB_ENV
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV
      - name: Add runner to AWS security group ingress
        run: aws ec2 authorize-security-group-ingress --group-name ${{ secrets.WEBOPS_AWS_SG_NAME }} --protocol tcp --port ${{ secrets.WEBOPS_JENKINS_PORT }} --cidr ${{ steps.ip.outputs.v4 }}/32
      - name: Trigger Jenkins pipeline
        run: |
          curl -H 'Content-Type: application/json' \
            -d '{ "TRIGGER_SOURCE": "${{ steps.cause.outputs.reason }}" }' \
            -X POST \
            ${{ secrets.WEBOPS_JENKINS_HOST }}:${{ secrets.WEBOPS_JENKINS_PORT || '80' }}/generic-webhook-trigger/invoke?token=${{ secrets.WEBOPS_WEBHOOK_TOKEN }}
      - name: Remove runner from AWS security group ingress
        if: always()
        run: aws ec2 revoke-security-group-ingress --group-name ${{ secrets.WEBOPS_AWS_SG_NAME }} --protocol tcp --port ${{ secrets.WEBOPS_JENKINS_PORT }} --cidr ${{ steps.ip.outputs.v4 }}/32
