name: Merge Window

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  workflow_dispatch:

jobs:
  check-merge-window:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Check merge window
        uses: actions/github-script@v7
        with:
          script: |
            // Two-tier merge window policy:
            //   Backend site changes (workflows, config, src, etc.): hard block outside
            //     7:00 am–2:00 pm PT, Mon–Fri, non-holidays. US-only window; India is not
            //     staffed for outage response.
            //   Docs and release notes (docs/, blog-*, images): soft warning only — should
            //     generally merge during India or US business hours, but not hard-blocked.
            // Override: apply the 'active-incident' label for active service incidents only.
            // Update holiday lists annually (see DOCS-1703).
            //
            // This workflow fires on PR open/reopen/ready_for_review/label changes only —
            // not on every push — to avoid failure emails on routine commits outside business
            // hours. Re-run manually from the Actions tab before merging a backend PR.

            const OVERRIDE_LABEL = 'active-incident';

            // USA + Global Quarterly Wellness Days — checked against the PT calendar date.
            const PT_HOLIDAYS = new Set([
              '2026-03-13', '2026-06-22', '2026-09-04', '2026-12-11', // Global QWDs
              '2026-01-01', '2026-01-19', '2026-05-25', '2026-06-19', // USA
              '2026-07-03', '2026-09-07', '2026-11-26', '2026-11-27',
              '2026-12-24', '2026-12-25', '2026-12-31',
            ]);

            // India + Global Quarterly Wellness Days — checked against the IST calendar date.
            const IST_HOLIDAYS = new Set([
              '2026-03-13', '2026-06-22', '2026-09-04', '2026-12-11', // Global QWDs
              '2026-01-01', '2026-01-14', '2026-01-26', '2026-05-01', // India
              '2026-05-27', '2026-09-14', '2026-10-02', '2026-10-20',
              '2026-11-06', '2026-12-25',
            ]);

            // Fail loudly if the holiday list has expired so merges don't silently slip through.
            const HOLIDAYS_VALID_THROUGH_YEAR = 2026;

            function getTimeInfo(timeZone) {
              const parts = Object.fromEntries(
                new Intl.DateTimeFormat('en-US', {
                  timeZone,
                  year: 'numeric', month: '2-digit', day: '2-digit',
                  weekday: 'long', hour: '2-digit', hourCycle: 'h23',
                }).formatToParts(new Date()).map(({ type, value }) => [type, value])
              );
              return {
                date:    `${parts.year}-${parts.month}-${parts.day}`,
                year:    parseInt(parts.year, 10),
                weekday: parts.weekday,
                hour:    parseInt(parts.hour, 10),
              };
            }

            const WEEKDAYS = new Set(['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday']);
            const pt  = getTimeInfo('America/Los_Angeles');
            const ist = getTimeInfo('Asia/Kolkata');

            if (pt.year > HOLIDAYS_VALID_THROUGH_YEAR) {
              core.setFailed(
                `Holiday list expired — only covers through ${HOLIDAYS_VALID_THROUGH_YEAR}. ` +
                'Update PT_HOLIDAYS and IST_HOLIDAYS in .github/workflows/merge-window.yml with ' +
                'the new year\'s dates from the Sumo Logic Holiday Calendar, then bump HOLIDAYS_VALID_THROUGH_YEAR.'
              );
              return;
            }

            // Backend site change window: 7:00 am–2:00 pm PT, Mon–Fri, no US/global holidays.
            let siteBlockedReason = null;
            if      (!WEEKDAYS.has(pt.weekday)) siteBlockedReason = 'weekend';
            else if (pt.hour < 7)              siteBlockedReason = 'before 7:00 am PT';
            else if (pt.hour >= 14)            siteBlockedReason = 'after 2:00 pm PT';
            else if (PT_HOLIDAYS.has(pt.date)) siteBlockedReason = `Sumo holiday (${pt.date} PT)`;

            if (!siteBlockedReason) {
              core.info(`Merge window open — PT: ${pt.weekday} ${pt.hour}:xx, IST: ${ist.weekday} ${ist.hour}:xx`);
              return;
            }

            // Check override label before fetching files.
            const labels = context.payload.pull_request?.labels ?? [];
            if (labels.some(l => l.name === OVERRIDE_LABEL)) {
              core.warning(`active-incident override active. Bypassed: ${siteBlockedReason}`);
              return;
            }

            // Classify the PR's changed files to determine enforcement level.
            // Docs and release notes (docs/, blog-*, images) → soft warning only.
            // Everything else (backend site changes) → hard block.
            const ARTICLE_PATTERNS = [
              /^docs\//,
              /^blog-/,
              /^static\/img\//,
            ];

            const { data: files } = await github.rest.pulls.listFiles({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page:    100,
            });

            const hasSiteChange = files.some(
              f => !ARTICLE_PATTERNS.some(p => p.test(f.filename))
            );

            if (hasSiteChange) {
              core.setFailed(
                `Merge blocked: ${siteBlockedReason}. ` +
                'Backend site changes require the merge window: Mon–Fri, 7:00 am–2:00 pm PT, non-holidays. ' +
                'Active service incident? Apply the active-incident label and re-run this check.'
              );
              return;
            }

            // Docs/release note PR — warn if outside India business hours too.
            const inIndiaHours = WEEKDAYS.has(ist.weekday) && ist.hour >= 8 && !IST_HOLIDAYS.has(ist.date);
            if (!inIndiaHours) {
              core.warning(
                `Outside recommended merge hours (${siteBlockedReason}, and before 8:00 am IST). ` +
                'Docs and release note PRs should generally merge during India or US business hours. ' +
                'Proceeding — no action needed unless this is outside a prior arrangement.'
              );
            } else {
              core.info(`Docs/release note PR — India team is active (${ist.weekday} ${ist.hour}:xx IST). Merge allowed.`);
            }
